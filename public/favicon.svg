<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#1c0a42"/>
      <stop offset="100%" stop-color="#03030a"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="110%" y2="110%">
      <stop offset="0%"   stop-color="#f0e6ff"/>
      <stop offset="45%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Purple glow orb -->
  <ellipse cx="16" cy="15" rx="13" ry="11" fill="url(#orb)"/>

  <!-- Gradient rim border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#rim)" stroke-width="0.8"/>

  <!-- JA — glowing gradient text -->
  <text x="16" y="23" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-weight="800" font-size="18" letter-spacing="-0.5"
        fill="url(#txt)" filter="url(#glow)">JA</text>
</svg>
